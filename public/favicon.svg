  <g transform="rotate(-20 50 50)">
    <ellipse cx="50" cy="50" rx="32" ry="15" fill="none" stroke="#8a8a94" stroke-width="6"/>
    <circle cx="50" cy="50" r="9" fill="#b91c3c"/>
    <circle cx="82" cy="50" r="7" fill="#f4f4f5"/>
    <circle cx="18" cy="50" r="7" fill="#e23b54"/>
  </g>
</svg>
